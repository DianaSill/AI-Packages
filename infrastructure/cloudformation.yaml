AWSTemplateFormatVersion: '2010-09-09'
Description: AI Packages - Family support system infrastructure

Parameters:
  DomainName:
    Type: String
    Description: Custom domain (e.g. packages.council.gov.uk)
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (us-east-1 for CloudFront)

Resources:
  # ─── Lambda ──────────────────────────────────────────────────────────────────
  PackagesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ai-packages-api
      Runtime: nodejs22.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 512
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          BASE_URL: !Sub 'https://${DomainName}'

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ai-packages-api
      Description: AI Packages REST API

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: '{proxy+}'

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PackagesFunction.Arn}/invocations'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: prod

  # ─── S3 (eForm hosting) ─────────────────────────────────────────────────────
  FormBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-eform'
      WebsiteConfiguration:
        IndexDocument: index.html

  # ─── CloudFront ──────────────────────────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ForwardedValues:
            QueryString: false
        CacheBehaviors:
          - PathPattern: 'api/*'
            TargetOriginId: api-origin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            ForwardedValues:
              QueryString: true
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt FormBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: api-origin
            DomainName: !Sub '${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: /prod
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        Enabled: true

  # ─── CloudFront Function (strip /api prefix) ────────────────────────────────
  ApiRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: packages-api-rewrite
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: Strip /api prefix before forwarding to API Gateway
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          request.uri = request.uri.replace(/^\/api/, '');
          return request;
        }

  # ─── IAM ─────────────────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ai-packages-*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub '${FormBucket.Arn}/*'
        - PolicyName: CrossAccountSES
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::*:role/PackagesSESRole'

Outputs:
  DistributionDomain:
    Value: !GetAtt Distribution.DomainName
  ApiEndpoint:
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
